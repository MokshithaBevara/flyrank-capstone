<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — FlyRank Capstone</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <p class="eyebrow">FlyRank Capstone</p>
      <h1>Settings</h1>
      <p class="subtitle">Manage your account, API access, and preferences.</p>
    </header>

    <form id="settings-form" class="settings-form" novalidate>
      <section class="form-section" aria-labelledby="account-heading">
        <h2 id="account-heading">Account</h2>
        <div class="field">
          <label for="display-name">Display name</label>
          <input
            type="text"
            id="display-name"
            name="displayName"
            autocomplete="name"
            placeholder="Your name"
            required
          >
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          >
        </div>
      </section>

      <section class="form-section" aria-labelledby="api-heading">
        <h2 id="api-heading">API</h2>
        <div class="field">
          <label for="api-key">API key</label>
          <input
            type="password"
            id="api-key"
            name="apiKey"
            autocomplete="off"
            placeholder="Enter your FlyRank API key"
          >
          <p class="hint">Used to connect your app to FlyRank services.</p>
        </div>
      </section>

      <section class="form-section" aria-labelledby="preferences-heading">
        <h2 id="preferences-heading">Preferences</h2>
        <div class="field">
          <label for="theme">Theme</label>
          <select id="theme" name="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System default</option>
          </select>
        </div>
        <div class="field">
          <label for="language">Default language</label>
          <select id="language" name="language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </div>
      </section>

      <section class="form-section" aria-labelledby="notifications-heading">
        <h2 id="notifications-heading">Notifications</h2>
        <div class="field field--checkbox">
          <input type="checkbox" id="email-alerts" name="emailAlerts">
          <label for="email-alerts">Send email alerts for ranking updates</label>
        </div>
        <div class="field field--checkbox">
          <input type="checkbox" id="weekly-digest" name="weeklyDigest">
          <label for="weekly-digest">Receive a weekly performance digest</label>
        </div>
      </section>

      <div id="form-message" class="form-message" role="status" aria-live="polite" hidden></div>

      <div class="form-actions">
        <button type="button" id="reset-btn" class="btn btn--secondary">Reset</button>
        <button type="submit" class="btn btn--primary">Save settings</button>
      </div>
    </form>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
